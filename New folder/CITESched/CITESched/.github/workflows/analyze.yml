name: Analyze
on: [push, pull_request]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install Dependencies
        run: |
          cd citesched_flutter && flutter pub get
          cd ../citesched_server && dart pub get

      - name: Run Analysis
        run: dart analyze .
